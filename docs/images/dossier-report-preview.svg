<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="hd" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#13203a"/><stop offset="1" stop-color="#0d1729"/></linearGradient>
  </defs>
  <rect width="900" height="620" fill="#0b1220"/>
  <rect x="40" y="32" width="820" height="120" rx="16" fill="url(#hd)" stroke="#243149"/>
  <text x="64" y="64" fill="#5ec8ff" font-size="11" letter-spacing="2" font-weight="700">EXECUTIVE REPORT</text>
  <text x="64" y="92" fill="#e6edf7" font-size="22" font-weight="700">Payments Platform — Executive Risk Brief</text>
  <text x="64" y="116" fill="#9fb0c9" font-size="12">MetaSec · Environment production · Generated by Dossier v0.2.0</text>

  <g>
    <rect x="64" y="128" width="120" height="6" rx="3" fill="#1f2c45"/>
  </g>
  <!-- cards -->
  <g>
    <rect x="40" y="168" width="196" height="84" rx="14" fill="#111a2e" stroke="#243149"/>
    <text x="60" y="192" fill="#9fb0c9" font-size="10">SCORE</text><text x="60" y="228" fill="#e6edf7" font-size="28" font-weight="700">63</text><text x="60" y="246" fill="#9fb0c9" font-size="11">Grade D</text>
    <rect x="248" y="168" width="196" height="84" rx="14" fill="#111a2e" stroke="#243149"/>
    <text x="268" y="192" fill="#9fb0c9" font-size="10">POSTURE</text><text x="268" y="222" fill="#fdba74" font-size="18" font-weight="700">Elevated risk</text>
    <rect x="456" y="168" width="196" height="84" rx="14" fill="#111a2e" stroke="#243149"/>
    <text x="476" y="192" fill="#9fb0c9" font-size="10">FINDINGS</text><text x="476" y="228" fill="#e6edf7" font-size="28" font-weight="700">9</text><text x="476" y="246" fill="#9fb0c9" font-size="11">9 total</text>
    <rect x="664" y="168" width="196" height="84" rx="14" fill="#111a2e" stroke="#243149"/>
    <text x="684" y="192" fill="#9fb0c9" font-size="10">ASSETS</text><text x="684" y="228" fill="#e6edf7" font-size="28" font-weight="700">12</text><text x="684" y="246" fill="#9fb0c9" font-size="11">affected</text>
  </g>

  <!-- severity chips -->
  <g font-size="11" font-weight="600">
    <rect x="40" y="268" width="86" height="24" rx="12" fill="rgba(244,63,94,0.16)"/><text x="83" y="285" fill="#fda4af" text-anchor="middle">Critical 2</text>
    <rect x="134" y="268" width="74" height="24" rx="12" fill="rgba(249,115,22,0.16)"/><text x="171" y="285" fill="#fdba74" text-anchor="middle">High 3</text>
    <rect x="216" y="268" width="92" height="24" rx="12" fill="rgba(234,179,8,0.16)"/><text x="262" y="285" fill="#fde68a" text-anchor="middle">Medium 2</text>
    <rect x="316" y="268" width="68" height="24" rx="12" fill="rgba(56,189,248,0.16)"/><text x="350" y="285" fill="#7dd3fc" text-anchor="middle">Low 1</text>
    <rect x="392" y="268" width="72" height="24" rx="12" fill="rgba(148,163,184,0.16)"/><text x="428" y="285" fill="#cbd5e1" text-anchor="middle">Info 1</text>
  </g>

  <!-- section: executive summary -->
  <rect x="40" y="312" width="820" height="120" rx="14" fill="#111a2e" stroke="#243149"/>
  <text x="64" y="340" fill="#e6edf7" font-size="16" font-weight="700">Executive Summary</text>
  <line x1="64" y1="352" x2="836" y2="352" stroke="#243149"/>
  <text x="64" y="378" fill="#d4deee" font-size="12">Payments Platform carries a report score of 63/100 (grade D) with an overall risk posture of</text>
  <text x="64" y="398" fill="#d4deee" font-size="12">Elevated risk. The review surfaced 9 actionable findings across 7 modules and 12 assets, with the</text>
  <text x="64" y="418" fill="#d4deee" font-size="12">highest observed severity being critical.</text>

  <!-- section: key risks table -->
  <rect x="40" y="448" width="820" height="148" rx="14" fill="#111a2e" stroke="#243149"/>
  <text x="64" y="476" fill="#e6edf7" font-size="16" font-weight="700">Key Risks</text>
  <line x1="64" y1="488" x2="836" y2="488" stroke="#243149"/>
  <g font-size="11" fill="#9fb0c9">
    <text x="64" y="510">#</text><text x="100" y="510">RISK</text><text x="520" y="510">SEVERITY</text><text x="660" y="510">MODULE</text>
  </g>
  <g font-size="12" fill="#d4deee">
    <text x="64" y="534">1</text><text x="100" y="534">Public database endpoint</text>
    <rect x="520" y="523" width="64" height="18" rx="9" fill="rgba(244,63,94,0.16)"/><text x="552" y="536" fill="#fda4af" font-size="10" text-anchor="middle" font-weight="600">critical</text>
    <text x="660" y="534">Cloudline</text>
    <text x="64" y="560">2</text><text x="100" y="560">IAM user with wildcard admin policy</text>
    <rect x="520" y="549" width="48" height="18" rx="9" fill="rgba(249,115,22,0.16)"/><text x="544" y="562" fill="#fdba74" font-size="10" text-anchor="middle" font-weight="600">high</text>
    <text x="660" y="560">Cloudline</text>
    <text x="64" y="586">3</text><text x="100" y="586">Workflow grants broad write permissions</text>
    <rect x="520" y="575" width="48" height="18" rx="9" fill="rgba(249,115,22,0.16)"/><text x="544" y="588" fill="#fdba74" font-size="10" text-anchor="middle" font-weight="600">high</text>
    <text x="660" y="586">Gatehouse</text>
  </g>
</svg>
